
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaptiQ | The Scholar's Scriptorium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #F5F2E7;
            --mahogany: #2D1B14;
            --gold: #D4AF37;
        }
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--parchment);
            color: var(--mahogany);
            scroll-behavior: smooth;
        }
        .font-playfair {
            font-family: 'Playfair Display', serif;
        }
        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
        }
        .leather-border {
            border: 1px solid #4a3728;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
        }
        .gold-leaf {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .button-scholarly {
            background-color: var(--mahogany);
            color: var(--parchment);
            transition: all 0.3s ease;
            border: 1px solid var(--gold);
        }
        .button-scholarly:hover {
            background-color: #3d261c;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 27, 20, 0.2);
        }
        @keyframes subtle-drift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
    </style>
</head>
<body class="paper-texture antialiased overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
